<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#d83945" />
    <title>小红书内容整理台</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <style>
      :root{--ink:#20242a;--muted:#69707a;--line:#dfe4ea;--paper:#fff;--soft:#f6f8fa;--accent:#d83945;--green:#1f8a70;--blue:#2f6db5;--gold:#a66e12}*{box-sizing:border-box}body{margin:0;background:#f6f8fa;color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}.app{max-width:980px;margin:0 auto;padding:12px 12px 88px}.panel,.card,.detail,.rules{background:var(--paper);border:1px solid var(--line);border-radius:8px}.top{display:flex;justify-content:space-between;gap:12px;padding:12px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.mark{display:grid;place-items:center;width:38px;height:38px;border-radius:8px;background:var(--accent);color:white;font-weight:800;flex:0 0 auto}h1{margin:0;font-size:18px;line-height:1.25}.sub{margin:2px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:7px;width:178px}button,label,select,input,textarea{font:inherit}button,label{min-height:34px;border:1px solid var(--line);border-radius:8px;background:white;padding:0 10px;font-weight:700}label{display:inline-flex;align-items:center}#fileInput{display:none}.primary{background:var(--accent);border-color:var(--accent);color:white}.search{margin-top:10px;padding:10px}.searchbox{display:grid;grid-template-columns:32px 1fr;border:1px solid var(--line);border-radius:8px;background:white;overflow:hidden}.searchbox span{text-align:center;color:var(--muted);line-height:42px}.searchbox input{border:0;outline:0;min-height:42px}.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}select{width:100%;min-height:40px;border:1px solid var(--line);border-radius:8px;background:white;padding:0 8px}.paste{display:none;margin-top:10px;padding:10px}.paste.active{display:block}.paste textarea{width:100%;min-height:104px;border:1px solid var(--line);border-radius:8px;padding:10px;resize:vertical}.paste .row{display:flex;gap:8px;margin-top:8px}.paste .row button{flex:1}.hint{margin:8px 0 0;color:var(--muted);font-size:12px;line-height:1.5}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}.metrics div{text-align:center;padding:9px 6px}.metrics b{display:block;font-size:18px}.metrics span{font-size:11px;color:var(--muted)}.tabs{display:flex;gap:8px;overflow:auto;margin:0 -12px;padding:0 12px 8px}.tab{flex:0 0 auto;min-width:100px;display:flex;justify-content:space-between;align-items:center}.tab.active,.nav button.active{border-color:var(--accent);background:#fff1f2;color:#b42733}.view{display:none}.view.active{display:block}.list{display:grid;gap:10px}.card{display:grid;grid-template-columns:1fr auto;gap:8px;min-height:128px;padding:12px;text-align:left;width:100%}.card.active{border-color:#f0a4aa;background:#fffafa}.card h3{margin:8px 0 0;font-size:16px;line-height:1.35}.card p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.meta,.chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.pill{display:inline-flex;align-items:center;min-height:24px;border-radius:999px;background:var(--soft);padding:0 8px;font-size:12px;font-weight:700}.favorite{background:#fff1f2;color:#b42733}.like{background:#eef6ff;color:var(--blue)}.note{background:#f6f0df;color:var(--gold)}.confidence{color:var(--muted);font-size:12px;white-space:nowrap}.detail,.rules{padding:14px}.detail h2{margin:0;font-size:20px;line-height:1.35}.block{margin-top:16px}.block h3{margin:0 0 8px;font-size:14px}.block p,.block li{font-size:14px;line-height:1.65;color:#424a54}.block ul{margin:0;padding-left:18px}.open{display:flex;align-items:center;justify-content:center;width:100%;min-height:44px;margin-top:16px;border-radius:8px;background:var(--green);color:white;text-decoration:none;font-weight:800}.empty{display:grid;min-height:220px;place-items:center;color:var(--muted);text-align:center}.rule-row{display:grid;gap:8px;margin-bottom:10px}.rule-row input,.rule-row textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px}.rule-row textarea{min-height:54px;color:var(--muted)}.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.section-title h2{margin:0;font-size:16px}.nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(12px)}.nav button{min-height:42px}@media(min-width:800px){.app{padding:20px;display:grid;grid-template-columns:1fr 340px;gap:14px}.top,.search,.paste,.metrics,.tabs,#notesView{grid-column:1}.detail{grid-column:2;grid-row:1/4}.rules{grid-column:2;grid-row:4/7}.nav{display:none}.view{display:block}.list{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}.actions{width:auto}}
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel top">
        <div class="brand"><span class="mark">红</span><div><h1>小红书内容整理台</h1><p class="sub">分类、摘要、搜索和跳转</p></div></div>
        <div class="actions">
          <label for="fileInput">导入</label><input id="fileInput" type="file" accept=".json,.csv,.txt,.md" />
          <button id="pasteToggle">粘贴</button><button id="loadSample">示例</button><button id="exportJson" class="primary">导出</button>
        </div>
      </section>
      <section class="panel search">
        <div class="searchbox"><span>⌕</span><input id="searchInput" type="search" placeholder="搜索标题、摘要、作者、关键词或链接" /></div>
        <div class="filters"><select id="categoryFilter"></select><select id="statusFilter"><option value="all">全部来源</option><option value="收藏">收藏</option><option value="点赞">点赞</option><option value="笔记">笔记</option></select></div>
      </section>
      <section id="pastePanel" class="panel paste">
        <textarea id="pasteInput" placeholder="从小红书复制分享文案或链接，粘贴到这里。例如：我分享给你一篇笔记，快来看吧 https://www.xiaohongshu.com/..."></textarea>
        <div class="row"><button id="readClipboard">读剪贴板</button><button id="addPasted" class="primary">加入整理台</button></div>
        <p class="hint">小红书里点“分享”后选“复制链接”，回到这里点“读剪贴板”或手动粘贴，再点“加入整理台”。如果已经安装成小 App，部分安卓浏览器还可以在分享菜单里直接选本工具。</p>
      </section>
      <section class="metrics"><div class="panel"><b id="totalCount">0</b><span>总内容</span></div><div class="panel"><b id="categoryCount">0</b><span>主题数</span></div><div class="panel"><b id="linkCount">0</b><span>可跳转</span></div><div class="panel"><b id="visibleCount">0</b><span>当前结果</span></div></section>
      <nav id="categoryTabs" class="tabs"></nav>
      <section id="notesView" class="view active"><div id="notesList" class="list"></div></section>
      <section id="detailView" class="view"><aside id="detailPane" class="detail"><div class="empty">选择一篇内容查看核心信息</div></aside></section>
      <section id="rulesView" class="view"><div class="rules"><div class="section-title"><h2>分类规则</h2><button id="addRule">+</button></div><div id="rulesList"></div></div></section>
    </main>
    <nav class="nav"><button class="navbtn active" data-view="notesView">列表</button><button class="navbtn" data-view="detailView">详情</button><button class="navbtn" data-view="rulesView">规则</button></nav>
    <template id="ruleTemplate"><div class="rule-row"><input class="rule-name" /><textarea class="rule-keywords"></textarea></div></template>
    <script>
const STORAGE_KEY="xhs-content-organizer-state-v3";const rules0=[{name:"绘画",keywords:["绘画","画画","插画","速写","水彩","油画","板绘","临摹","构图","色彩"]},{name:"书单",keywords:["书单","读书","小说","文学","阅读","书摘","作者","出版社","推荐书"]},{name:"语言学习",keywords:["英语","日语","韩语","法语","语言","背单词","口语","听力","语法","雅思","托福"]},{name:"美食",keywords:["美食","食谱","做饭","烘焙","探店","餐厅","咖啡","甜品","菜谱","减脂餐"]},{name:"穿搭",keywords:["穿搭","ootd","搭配","显瘦","通勤","妆容","护肤","发型"]},{name:"旅行",keywords:["旅行","攻略","酒店","路线","景点","城市","机票","签证"]},{name:"学习效率",keywords:["学习","笔记","效率","复习","考试","规划","自律","课程"]},{name:"其他",keywords:[]}];const samples=[{title:"新手水彩花朵练习：三步控制晕染边缘",content:"先用清水铺底，再用低饱和粉色从花心向外点染。重点是等纸面半干时补阴影，边缘会自然柔和。适合刚开始画水彩的人练习控水和配色。",author:"小周画画",source:"收藏",link:"https://www.xiaohongshu.com/explore/watercolor-demo",tags:["水彩","绘画","新手"]},{title:"今年读完最想推荐的 8 本书",content:"书单偏文学和非虚构，包括女性成长、城市观察和心理学入门。每本都附了适合人群和阅读节奏，通勤每天 30 分钟也能读完。",author:"夜读手账",source:"点赞",link:"https://www.xiaohongshu.com/explore/book-list-8",tags:["读书","书单"]}];let rules=structuredClone(rules0),notes=[],activeCategory="全部",selectedId=null,activeView="notesView";const $=s=>document.querySelector(s),els={file:$("#fileInput"),pasteToggle:$("#pasteToggle"),pastePanel:$("#pastePanel"),pasteInput:$("#pasteInput"),readClipboard:$("#readClipboard"),addPasted:$("#addPasted"),loadSample:$("#loadSample"),exportJson:$("#exportJson"),search:$("#searchInput"),cat:$("#categoryFilter"),status:$("#statusFilter"),tabs:$("#categoryTabs"),list:$("#notesList"),detail:$("#detailPane"),rulesList:$("#rulesList"),addRule:$("#addRule"),total:$("#totalCount"),catCount:$("#categoryCount"),linkCount:$("#linkCount"),visible:$("#visibleCount"),views:document.querySelectorAll(".view"),nav:document.querySelectorAll(".navbtn")};
function t(v){return String(v||"").trim()}function split(v){return t(v).split(/[，,、\n]/).map(x=>x.trim()).filter(Boolean)}function findUrl(v){const m=t(v).match(/https?:\/\/[^\s'"<>，。]+/i);return m?m[0]:""}function titleFromShare(v){const clean=t(v).replace(findUrl(v),"").replace(/复制.*$/,"").replace(/#小红书.*/,"").replace(/\s+/g," ");return clean.slice(0,80)||"来自小红书的链接"}function sum(v,n=92){const c=t(v).replace(/\s+/g," ");if(!c)return"只有链接，建议之后补充标题或备注。";const s=c.split(/[。！？!?]/).find(p=>p.length>=12)||c;return s.length>n?s.slice(0,n)+"...":s}function score(s){let n=s.length>18?2:0;if(/(方法|清单|步骤|推荐|教程|攻略|重点|核心|总结|新手)/.test(s))n+=4;return n}function pts(n){return(`${n.title}。${n.content}`).split(/[。！？!?\n]/).map(x=>x.trim()).filter(x=>x.length>=8).sort((a,b)=>score(b)-score(a)).slice(0,4)}function classify(n){const h=`${n.title} ${n.content} ${n.tags.join(" ")}`.toLowerCase();const best=rules.filter(r=>r.name!=="其他").map(r=>{const hits=r.keywords.filter(k=>h.includes(k.toLowerCase()));return{name:r.name,hits,score:hits.length}}).sort((a,b)=>b.score-a.score)[0];return best&&best.score?{category:best.name,matchedKeywords:best.hits,confidence:Math.min(99,56+best.score*12)}:{category:"其他",matchedKeywords:[],confidence:42}}function norm(raw,i){const title=t(raw.title||raw.标题||raw.name||`未命名内容 ${i+1}`),content=t(raw.content||raw.正文||raw.desc||raw.text||""),link=t(raw.link||raw.url||raw.链接||findUrl(`${title} ${content}`)),tags=Array.isArray(raw.tags)?raw.tags.map(t).filter(Boolean):split(raw.tags||raw.标签||"");const n={id:raw.id||`note-${Date.now()}-${i}`,title,content,link,author:t(raw.author||raw.作者||"未知作者"),source:t(raw.source||raw.来源||"笔记").includes("赞")?"点赞":t(raw.source||raw.来源||"笔记").includes("藏")?"收藏":t(raw.source||raw.来源||"笔记"),tags,createdAt:t(raw.time||raw.时间||"")},c=classify(n);return{...n,...c,summary:sum(content||title),keyPoints:pts(n)}}function noteFromShare(v){const link=findUrl(v);return norm({title:titleFromShare(v),content:t(v),link,source:"笔记",tags:[]},notes.length)}
function parseTxt(v){return v.split(/\n{2,}/).map((b,i)=>{const ls=b.split("\n").map(x=>x.trim()).filter(Boolean);return ls.length?{title:ls[0].replace(findUrl(ls[0]),"").trim()||`链接内容 ${i+1}`,content:ls.slice(1).join(" "),link:findUrl(b)}:null}).filter(Boolean)}function parseInput(v,name=""){try{const p=JSON.parse(v);return Array.isArray(p)?p:p.items||p.notes||p.data||[]}catch{return parseTxt(v)}}function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify({rules,notes,activeCategory,selectedId}))}function load(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");if(s){rules=Array.isArray(s.rules)?s.rules:rules;notes=Array.isArray(s.notes)?s.notes:notes;activeCategory=s.activeCategory||activeCategory;selectedId=s.selectedId||selectedId}}catch{}}function recat(){notes=notes.map((n,i)=>norm(n,i));save();render()}function cats(){return[...new Set(["全部",...rules.map(r=>r.name)])]}function filtered(){const q=els.search.value.trim().toLowerCase(),fc=els.cat.value||"全部",st=els.status.value;return notes.filter(n=>(activeCategory==="全部"||n.category===activeCategory)&&(fc==="全部"||n.category===fc)&&(st==="all"||n.source===st)&&(!q||[n.title,n.content,n.summary,n.author,n.link,n.category,n.tags.join(" "),n.matchedKeywords.join(" ")].join(" ").toLowerCase().includes(q)))}function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function scls(s){return s==="收藏"?"favorite":s==="点赞"?"like":"note"}
function renderRules(){els.rulesList.innerHTML="";const tpl=$("#ruleTemplate");rules.forEach((r,i)=>{const n=tpl.content.cloneNode(true),a=n.querySelector(".rule-name"),b=n.querySelector(".rule-keywords");a.value=r.name;b.value=r.keywords.join("，");a.onchange=()=>{rules[i].name=a.value.trim()||r.name;recat()};b.onchange=()=>{rules[i].keywords=split(b.value);recat()};els.rulesList.appendChild(n)})}function renderFilters(){const cur=els.cat.value||activeCategory;els.cat.innerHTML=cats().map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join("");els.cat.value=cats().includes(cur)?cur:"全部"}function renderTabs(){const c=notes.reduce((a,n)=>(a[n.category]=(a[n.category]||0)+1,a),{});els.tabs.innerHTML=cats().map(n=>`<button class="tab ${activeCategory===n?"active":""}" data-category="${esc(n)}"><span>${esc(n)}</span><span>${n==="全部"?notes.length:c[n]||0}</span></button>`).join("");els.tabs.querySelectorAll("button").forEach(b=>b.onclick=()=>{activeCategory=b.dataset.category;els.cat.value=activeCategory;save();render()})}function renderNotes(){const fs=filtered();els.visible.textContent=fs.length;if(!fs.length){els.list.innerHTML='<div class="empty">没有匹配结果</div>';renderDetail(null);return}if(!fs.some(n=>n.id===selectedId))selectedId=fs[0].id;els.list.innerHTML=fs.map(n=>`<button class="card ${selectedId===n.id?"active":""}" data-id="${esc(n.id)}"><div><div class="meta"><span class="pill ${scls(n.source)}">${esc(n.source)}</span><span class="pill">${esc(n.category)}</span><span class="confidence">${n.confidence}% 匹配</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p></div><span class="confidence">${n.link?"可跳转":"无链接"}</span></button>`).join("");els.list.querySelectorAll(".card").forEach(b=>b.onclick=()=>{selectedId=b.dataset.id;activeView="detailView";save();render();setView("detailView")});renderDetail(notes.find(n=>n.id===selectedId))}function renderDetail(n){if(!n){els.detail.innerHTML='<div class="empty">选择一篇内容查看核心信息</div>';return}els.detail.innerHTML=`<h2>${esc(n.title)}</h2><div class="meta" style="margin-top:10px"><span class="pill ${scls(n.source)}">${esc(n.source)}</span><span class="pill">${esc(n.category)}</span><span class="pill">${esc(n.author)}</span></div><div class="block"><h3>核心摘要</h3><p>${esc(n.summary)}</p></div><div class="block"><h3>要点</h3><ul>${(n.keyPoints.length?n.keyPoints:[n.content||n.title]).map(p=>`<li>${esc(p)}</li>`).join("")}</ul></div><div class="block"><h3>命中关键词</h3><div class="chips">${(n.matchedKeywords.length?n.matchedKeywords:["暂无"]).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div></div><div class="block"><h3>原文链接</h3><p>${n.link?esc(n.link):"未导入链接"}</p></div>${n.link?`<a class="open" href="${esc(n.link)}" target="_blank" rel="noreferrer">打开小红书原帖</a>`:""}`}function renderMetrics(){els.total.textContent=notes.length;els.catCount.textContent=new Set(notes.map(n=>n.category)).size;els.linkCount.textContent=notes.filter(n=>n.link).length}function setView(v){activeView=v;els.views.forEach(x=>x.classList.toggle("active",x.id===v));els.nav.forEach(b=>b.classList.toggle("active",b.dataset.view===v))}function render(){renderFilters();renderTabs();renderMetrics();renderNotes();renderRules();setView(activeView)}
function addShareText(v){const n=noteFromShare(v);if(!n.link&&!n.title)return;notes=[n,...notes];selectedId=n.id;activeCategory="全部";activeView="detailView";save();render();setView("detailView");els.pasteInput.value=""}async function handleShareParams(){const p=new URLSearchParams(location.search),shared=[p.get("title"),p.get("text"),p.get("url")].filter(Boolean).join("\n");if(shared){addShareText(shared);history.replaceState(null,"",location.pathname)}}async function loadFile(f){const txt=await f.text();notes=parseInput(txt,f.name).map(norm);selectedId=notes[0]?.id||null;activeCategory="全部";activeView="notesView";save();render()}function download(){const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),rules,notes},null,2)],{type:"application/json;charset=utf-8"}),u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download="xhs-content-organized.json";a.click();URL.revokeObjectURL(u)}
els.file.onchange=e=>{const f=e.target.files[0];if(f)loadFile(f)};els.pasteToggle.onclick=()=>els.pastePanel.classList.toggle("active");els.readClipboard.onclick=async()=>{try{els.pasteInput.value=await navigator.clipboard.readText()}catch{alert("浏览器不允许读取剪贴板，请手动粘贴。")}};els.addPasted.onclick=()=>addShareText(els.pasteInput.value);els.loadSample.onclick=()=>{notes=samples.map(norm);selectedId=notes[0]?.id||null;activeCategory="全部";activeView="notesView";save();render()};els.addRule.onclick=()=>{rules.splice(rules.length-1,0,{name:"新分类",keywords:["关键词"]});save();render();setView("rulesView")};els.search.oninput=renderNotes;els.cat.onchange=()=>{activeCategory=els.cat.value;save();render()};els.status.onchange=renderNotes;els.exportJson.onclick=download;els.nav.forEach(b=>b.onclick=()=>setView(b.dataset.view));load();render();handleShareParams();if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
    </script>
