  <main class="app">
    <section class="panel top">

    <section id="detailView" class="view"><aside id="detailPane" class="detail"><div class="empty">选择一篇内容查看核心信息</div></aside></section>
    <section id="rulesView" class="view"><div class="rules"><div class="section-title"><h2>自动分类逻辑</h2><button id="recluster">重算</button></div><div id="rulesList"></div></div></section>
  </main>

const samples=[
  {title:"空气炸锅鸡腿低油晚餐教程",content:"鸡腿肉用生抽、蒜末腌20分钟，180度烤15分钟后翻面，适合新手做饭。",source:"收藏",link:"https://www.xiaohongshu.com/explore/cook-demo"},
  {title:"上海周末咖啡店探店攻略",content:"整理了三家适合拍照的咖啡店，人均、地址、推荐菜和避雷点都写了。",source:"点赞",link:"https://www.xiaohongshu.com/explore/cafe-guide"},

];
let notes=[],activeCategory="全部",selectedId=null,activeView="notesView";
const $=s=>document.querySelector(s),els={file:$("#fileInput"),pasteToggle:$("#pasteToggle"),pastePanel:$("#pastePanel"),pasteInput:$("#pasteInput"),readClipboard:$("#readClipboard"),addPasted:$("#addPasted"),loadSample:$("#loadSample"),exportJson:$("#exportJson"),search:$("#searchInput"),cat:$("#categoryFilter"),status:$("#statusFilter"),tabs:$("#categoryTabs"),list:$("#notesList"),detail:$("#detailPane"),rulesList:$("#rulesList"),recluster:$("#recluster"),total:$("#totalCount"),catCount:$("#categoryCount"),linkCount:$("#linkCount"),visible:$("#visibleCount"),views:document.querySelectorAll(".view"),nav:document.querySelectorAll(".navbtn")};
function text(v){return String(v||"").trim()}function url(v){const m=text(v).match(/https?:\/\/[^\s'"<>，。]+/i);return m?m[0]:""}function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function hitScore(h,words){return words.reduce((n,w)=>n+(h.includes(w.toLowerCase())?1:0),0)}
function bestLabel(h,rules,fallback){let best={name:fallback,score:0,hits:[]};for(const [name,words] of rules){const hits=words.filter(w=>h.includes(w.toLowerCase()));if(hits.length>best.score)best={name,score:hits.length,hits}}return best}
function defaultIntent(domainName){
  const map={
    "游戏":"游戏推荐",
    "影视":"片单推荐",
    "动漫":"动漫推荐",
    "音乐演出":"歌单推荐",
    "阅读":"清单推荐",
    "美食":"探店攻略",
    "旅行":"旅行攻略",
    "学习":"学习计划",
    "绘画":"灵感素材"
  };
  return map[domainName]||"资料收藏";
}
function classify(note){const h=`${note.title} ${note.content} ${note.comment||""} ${note.comments||""} ${note.tags?.join(" ")||""}`.toLowerCase();const domain=bestLabel(h,domainRules,"综合");let intent=bestLabel(h,intentRules,defaultIntent(domain.name));if(domain.name==="游戏"&&["教程方法","资料收藏"].includes(intent.name))intent={name:"游戏攻略",score:intent.score,hits:intent.hits};if(domain.name==="影视"&&["教程方法","资料收藏","清单推荐"].includes(intent.name))intent={name:"片单推荐",score:intent.score,hits:intent.hits};if(domain.name==="动漫"&&["教程方法","资料收藏","清单推荐"].includes(intent.name))intent={name:"动漫推荐",score:intent.score,hits:intent.hits};if(domain.name==="音乐演出"&&["资料收藏","清单推荐"].includes(intent.name))intent={name:"歌单推荐",score:intent.score,hits:intent.hits};if(domain.name==="美食"&&intent.name==="旅行攻略")intent={name:"探店攻略",score:intent.score,hits:intent.hits};if(domain.name==="旅行"&&intent.name==="探店攻略")intent={name:"旅行攻略",score:intent.score,hits:intent.hits};if(domain.name!=="美食"&&intent.name==="烹饪教程")intent={name:"教程方法",score:intent.score,hits:intent.hits};const category=domain.name==="综合"?intent.name:`${domain.name}·${intent.name}`;return{category,matchedKeywords:[...new Set([...domain.hits,...intent.hits])],confidence:Math.min(99,46+(domain.score+intent.score)*8)}}
function summary(v,n=92){const c=text(v).replace(/\s+/g," ");if(!c)return"只有链接，建议之后补充标题或备注。";const s=c.split(/[。！？!?]/).find(p=>p.length>=12)||c;return s.length>n?s.slice(0,n)+"...":s}
function points(note){return`${note.title}。${note.content}`.split(/[。！？!?\n]/).map(x=>x.trim()).filter(x=>x.length>7).slice(0,4)}
function normalize(raw,i){const title=text(raw.title||raw.标题||raw.name||`未命名内容 ${i+1}`),content=text(raw.content||raw.正文||raw.desc||raw.text||""),link=text(raw.link||raw.url||raw.链接||url(`${title} ${content}`));const source=text(raw.source||raw.来源||"笔记");const comment=text(raw.comment||raw.comments||raw.评论||raw.评论内容||"");const note={id:raw.id||`note-${Date.now()}-${i}`,title,content,comment,link,author:text(raw.author||raw.作者||"未知作者"),source:source.includes("赞")?"点赞":source.includes("藏")?"收藏":source,tags:Array.isArray(raw.tags)?raw.tags:[],createdAt:text(raw.time||raw.时间||"")};const c=classify(note);return{...note,...c,summary:summary(content||comment||title),keyPoints:points(note)}}
function parseTxt(v){return v.split(/\n{2,}/).map((b,i)=>{const lines=b.split("\n").map(x=>x.trim()).filter(Boolean);if(!lines.length)return null;return{title:lines[0].replace(url(lines[0]),"").trim()||`链接内容 ${i+1}`,content:lines.slice(1).join(" "),link:url(b)}}).filter(Boolean)}
function parseInput(v){try{const p=JSON.parse(v);return Array.isArray(p)?p:p.items||p.notes||p.data||[]}catch{return parseTxt(v)}}
function titleFromShare(v){return text(v).replace(url(v),"").replace(/\s+/g," ").slice(0,80)||"来自小红书的链接"}
function addShare(v){const n=normalize({title:titleFromShare(v),content:text(v),link:url(v),source:"笔记"},notes.length);notes=[n,...notes];selectedId=n.id;activeCategory="全部";activeView="detailView";save();render();setView("detailView");els.pasteInput.value=""}
function recluster(){notes=notes.map((n,i)=>normalize(n,i));save();render()}
function save(){localStorage.setItem(STORE,JSON.stringify({notes,activeCategory,selectedId}))}function load(){try{const s=JSON.parse(localStorage.getItem(STORE)||"null");if(s){notes=(s.notes||[]).map(normalize);activeCategory=s.activeCategory||"全部";selectedId=s.selectedId||null}}catch{}}
function categories(){return["全部",...Array.from(new Set(notes.map(n=>n.category))).sort((a,b)=>a.localeCompare(b,"zh-CN"))]}
function filtered(){const q=els.search.value.trim().toLowerCase(),fc=els.cat.value||"全部",st=els.status.value;return notes.filter(n=>(activeCategory==="全部"||n.category===activeCategory)&&(fc==="全部"||n.category===fc)&&(st==="all"||n.source===st)&&(!q||[n.title,n.content,n.summary,n.author,n.link,n.category,n.matchedKeywords.join(" ")].join(" ").toLowerCase().includes(q)))}

function renderTabs(){const counts=notes.reduce((a,n)=>(a[n.category]=(a[n.category]||0)+1,a),{});els.tabs.innerHTML=categories().map(c=>`<button class="tab ${activeCategory===c?"active":""}" data-c="${esc(c)}"><span>${esc(c)}</span><span>${c==="全部"?notes.length:counts[c]||0}</span></button>`).join("");els.tabs.querySelectorAll("button").forEach(b=>b.onclick=()=>{activeCategory=b.dataset.c;els.cat.value=activeCategory;save();render()})}
function renderFilters(){const cur=els.cat.value||activeCategory;els.cat.innerHTML=categories().map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");els.cat.value=categories().includes(cur)?cur:"全部"}
function renderList(){const fs=filtered();els.visible.textContent=fs.length;if(!fs.length){els.list.innerHTML='<div class="empty">没有匹配结果</div>';renderDetail(null);return}if(!fs.some(n=>n.id===selectedId))selectedId=fs[0].id;els.list.innerHTML=fs.map(n=>`<button class="card ${selectedId===n.id?"active":""}" data-id="${esc(n.id)}"><div><div class="meta"><span class="pill ${sourceClass(n.source)}">${esc(n.source)}</span><span class="pill">${esc(n.category)}</span><span class="confidence">${n.confidence}% 匹配</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p></div><span class="confidence">${n.link?"可跳转":"无链接"}</span></button>`).join("");els.list.querySelectorAll(".card").forEach(b=>b.onclick=()=>{selectedId=b.dataset.id;activeView="detailView";save();render();setView("detailView")});renderDetail(notes.find(n=>n.id===selectedId))}
function renderDetail(n){if(!n){els.detail.innerHTML='<div class="empty">选择一篇内容查看核心信息</div>';return}els.detail.innerHTML=`<h2>${esc(n.title)}</h2><div class="meta" style="margin-top:10px"><span class="pill ${sourceClass(n.source)}">${esc(n.source)}</span><span class="pill">${esc(n.category)}</span><span class="pill">${esc(n.author)}</span></div><div class="block"><h3>核心摘要</h3><p>${esc(n.summary)}</p></div><div class="block"><h3>要点</h3><ul>${(n.keyPoints.length?n.keyPoints:[n.content||n.title]).map(p=>`<li>${esc(p)}</li>`).join("")}</ul></div><div class="block"><h3>命中关键词</h3><div class="chips">${(n.matchedKeywords.length?n.matchedKeywords:["暂无"]).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div></div><div class="block"><h3>原文链接</h3><p>${n.link?esc(n.link):"未导入链接"}</p></div>${n.link?`<a class="open" href="${esc(n.link)}" target="_blank" rel="noreferrer">打开小红书原帖</a>`:""}`}
function renderRules(){els.rulesList.innerHTML=`<div class="rule"><b>自动生成方式</b><p>导入后按“领域 + 用途”生成细分类，例如“游戏·游戏推荐”“影视·片单推荐”“美食·烹饪教程”“美食·探店攻略”。</p></div><div class="rule"><b>领域识别</b><p>新增游戏、影视、动漫、音乐演出；也会继续识别美食、旅行、学习、绘画、阅读、穿搭美妆、家居生活等。</p></div><div class="rule"><b>用途识别</b><p>新增游戏攻略、游戏推荐、片单推荐、影评解析、动漫推荐、歌单推荐；如果领域明确，不会轻易掉到“教程方法”或“资料收藏”。</p></div>`}
function renderMetrics(){els.total.textContent=notes.length;els.catCount.textContent=new Set(notes.map(n=>n.category)).size;els.linkCount.textContent=notes.filter(n=>n.link).length}
function setView(v){activeView=v;els.views.forEach(x=>x.classList.toggle("active",x.id===v));els.nav.forEach(b=>b.classList.toggle("active",b.dataset.view===v))}
function render(){renderFilters();renderTabs();renderMetrics();renderList();renderRules();setView(activeView)}
async function loadFile(f){const txt=await f.text();notes=parseInput(txt).map(normalize);selectedId=notes[0]?.id||null;activeCategory="全部";activeView="notesView";save();render()}
function download(){const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),notes},null,2)],{type:"application/json;charset=utf-8"}),u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download="xhs-content-organized.json";a.click();URL.revokeObjectURL(u)}
async function shareParams(){const p=new URLSearchParams(location.search),shared=[p.get("title"),p.get("text"),p.get("url")].filter(Boolean).join("\n");if(shared){addShare(shared);history.replaceState(null,"",location.pathname)}}
els.file.onchange=e=>{const f=e.target.files[0];if(f)loadFile(f)};els.pasteToggle.onclick=()=>els.pastePanel.classList.toggle("active");els.readClipboard.onclick=async()=>{try{els.pasteInput.value=await navigator.clipboard.readText()}catch{alert("浏览器不允许读取剪贴板，请手动粘贴。")}};els.addPasted.onclick=()=>addShare(els.pasteInput.value);els.loadSample.onclick=()=>{notes=samples.map(normalize);selectedId=notes[0].id;activeCategory="全部";activeView="notesView";save();render()};els.recluster.onclick=recluster;els.search.oninput=renderList;els.cat.onchange=()=>{activeCategory=els.cat.value;save();render()};els.status.onchange=renderList;els.exportJson.onclick=download;els.nav.forEach(b=>b.onclick=()=>setView(b.dataset.view));load();render();shareParams();if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
  </script>
</body>
