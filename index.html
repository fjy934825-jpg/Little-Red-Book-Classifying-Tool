function cleanShareText(v){let s=text(v);s=s.replace(/https?:\/\/\S+/gi," ");s=s.replace(/(^|[\n\r])\s*[\dA-Za-z+/=\s-]{2,}\s*[:：]\s*\/?\s*/g,"$1 ");s=s.replace(/[「『【\[]?[^「『【\[\n]{0,18}(复制|復制|拷贝|带上|带着|口令)[^。！？!?\n]{0,100}(小红书|小紅書|RED|App|APP|app)[^。！？!?\n]*[」』】\]]?/gi," ");s=s.replace(/(笔记|筆記|圖片|图片|视频|內容|内容)\s*(在|来自|來源于|源自)\s*(小红书|小紅書|RED)?[^。！？!?\n]*/gi," ");s=s.replace(/(小红书号|小紅書號|作者ID|用户ID)[:：]?\s*\S+/gi," ");s=s.replace(/复制本条信息[^。！？!?\n]*/g," ");s=s.replace(/\b(xhslink|xiaohongshu)\b/gi," ");return s.split(/([。！？!?\n；;]+)/).reduce((arr,part,i,parts)=>{if(i%2===0){const sentence=part.replace(/^[。！？!?\s]+|[。！？!?\s]+$/g,"").trim();const punctuation=parts[i+1]&&parts[i+1].includes("\n")?"\n":" ";if(sentence&&!isShareNoise(sentence))arr.push(sentence+punctuation)}return arr},[]).join("").split(/[\n\r]+/).map(x=>x.trim()).filter(Boolean).join("\n").replace(/[ \t]+/g," ").replace(/\n{2,}/g,"\n").trim()}
function cleanBody(v,title=""){let s=cleanShareText(v).replace(url(v)," ").replace(/https?:\/\/\S+/g," ").replace(/\s+/g," ").trim();if(title){const compactTitle=cleanShareText(title).replace(/\s+/g,"");s=s.split(/[。！？!?\n]/).filter(x=>x.replace(/\s+/g,"")!==compactTitle&&!isShareNoise(x)).join("。")}return s}
function splitSentences(v){return cleanBody(v).split(/[。！？!?\n；;]/).map(x=>x.trim()).filter(x=>x.length>=6&&x.length<=160)}
function infoScore(s){let n=0;if(/[0-9一二三四五六七八九十]+/.test(s))n+=2;if(/(步骤|做法|配方|路线|片单|清单|推荐|攻略|避雷|经验|教程|测评|对比|适合|人均|地址|结局|角色|阵容|玩法|优缺点|注意)/.test(s))n+=4;if(/(评论|姐妹|大家|反馈|实测|亲测|真实|好评|踩雷)/.test(s))n+=2;if(s.length>=18&&s.length<=90)n+=2;if(/^(标题|链接|复制|打开|来自小红书)/.test(s))n-=5;return n}
function extractInfo(note){const title=text(note.title);const body=cleanBody([note.content,note.comment,note.comments].filter(Boolean).join("。"),title);const sentences=splitSentences(body);const uniq=[];for(const s of sentences){if(!uniq.some(x=>x.includes(s)||s.includes(x)))uniq.push(s)}const ranked=uniq.sort((a,b)=>infoScore(b)-infoScore(a));const best=ranked.slice(0,5);let summaryText="";if(best.length){summaryText=best.slice(0,2).join("；");}else if(body){summaryText=body.slice(0,96);}else{summaryText=`这是一条“${note.category||"待分类"}”内容，目前只有标题或链接，建议补充正文/评论后再重算摘要。`;}if(summaryText.length>120)summaryText=summaryText.slice(0,120)+"...";return{summary:summaryText,keyPoints:best.length?best:[body||title].filter(Boolean)}}
function points(note){return extractInfo(note).keyPoints}
function normalize(raw,i){const rawTitle=text(raw.title||raw.标题||raw.name||`未命名内容 ${i+1}`),rawContent=text(raw.content||raw.正文||raw.desc||raw.text||""),link=text(raw.link||raw.url||raw.链接||url(`${rawTitle} ${rawContent}`));const title=cleanShareText(rawTitle)||titleFromShare(`${rawTitle}\n${rawContent}`),content=cleanBody(rawContent,title);const source=text(raw.source||raw.来源||"笔记");const comment=cleanBody(raw.comment||raw.comments||raw.评论||raw.评论内容||"");const rawTags=raw.tags||raw.关键词||raw.keywords||[];const tags=(Array.isArray(rawTags)?rawTags:text(rawTags).split(/[，,、\s]+/)).map(x=>cleanShareText(x)).filter(x=>x&&!isShareNoise(x));const customCategory=text(raw.customCategory||raw.categoryManual||raw.categoryOverride||raw.分区||"");const note={id:raw.id||`note-${Date.now()}-${i}`,title,content,comment,link,author:text(raw.author||raw.作者||"未知作者"),source:source.includes("赞")?"点赞":source.includes("藏")?"收藏":source,tags,customCategory,createdAt:text(raw.time||raw.时间||"")};const c=classify(note);if(customCategory){c.category=customCategory;c.confidence=100}const info=extractInfo({...note,...c});return{...note,...c,summary:info.summary,keyPoints:info.keyPoints}}
function parseTxt(v){return v.split(/\n{2,}/).map((b,i)=>{const lines=b.split("\n").map(x=>x.trim()).filter(Boolean);if(!lines.length)return null;return{title:lines[0].replace(url(lines[0]),"").trim()||`链接内容 ${i+1}`,content:lines.slice(1).join(" "),link:url(b)}}).filter(Boolean)}
function parseInput(v){try{const p=JSON.parse(v);return Array.isArray(p)?p:p.items||p.notes||p.data||[]}catch{return parseTxt(v)}}
function titleFromShare(v){const cleaned=cleanShareText(v);const candidates=cleaned.split(/[。！？!?\n；;]/).map(x=>x.trim()).filter(x=>x.length>=2&&!isShareNoise(x));return (candidates[0]||cleaned).replace(/\s+/g," ").slice(0,80)||"来自小红书的链接"}
function fillManualFromPaste(){const pasted=text(els.pasteInput.value);const link=url(pasted);if(link&&!els.manualLink.value)els.manualLink.value=link;const title=titleFromShare(pasted);if(title&&title!=="来自小红书的链接"&&!els.manualTitle.value)els.manualTitle.value=title}
function clearManualForm(){editingId=null;els.pasteInput.value="";els.manualLink.value="";els.manualTitle.value="";els.manualKeywords.value="";els.manualCategory.value="";els.manualComment.value="";els.addPasted.textContent="加入整理台"}
function addManual(){fillManualFromPaste();const link=text(els.manualLink.value)||url(els.pasteInput.value);const title=text(els.manualTitle.value)||titleFromShare(els.pasteInput.value);const comment=text(els.manualComment.value);const keywords=text(els.manualKeywords.value);const customCategory=text(els.manualCategory.value);if(!link&&!title&&!comment&&!keywords&&!customCategory){alert("请先粘贴链接，或填写标题/关键词/备注。");return}const existing=link&&notes.find(n=>n.link===link&&n.id!==editingId);if(existing){selectedId=existing.id;activeView="detailView";render();setView("detailView");if(!confirm("这个链接已经在整理台里了。要继续新增一条重复内容吗？"))return}const base=editingId?notes.find(n=>n.id===editingId):null;const n=normalize({...(base||{}),id:editingId||undefined,title,content:text(els.pasteInput.value),comment,link,source:base?.source||"笔记",tags:keywords,customCategory},notes.length);if(editingId){notes=notes.map(item=>item.id===editingId?n:item)}else{notes=[n,...notes]}selectedId=n.id;editingId=null;activeCategory="全部";activeView="detailView";save();render();setView("detailView");clearManualForm()}
function editNote(id){const note=notes.find(n=>n.id===id);if(!note)return;editingId=id;els.pastePanel.classList.add("active");els.pasteInput.value=note.content||"";els.manualLink.value=note.link||"";els.manualTitle.value=note.title||"";els.manualKeywords.value=(note.tags||[]).join("，");els.manualCategory.value=note.customCategory||note.category||"";els.manualComment.value=note.comment||"";els.addPasted.textContent="保存修改";activeView="notesView";setView("notesView");window.scrollTo({top:0,behavior:"smooth"})}
function deleteNote(id){const note=notes.find(n=>n.id===id);if(!note)return;if(!confirm(`确定删除“${note.title}”吗？`))return;notes=notes.filter(n=>n.id!==id);selectedId=notes[0]?.id||null;activeCategory="全部";activeView="notesView";save();render();setView("notesView")}
function recluster(){notes=notes.map((n,i)=>normalize(n,i));save();render()}
function save(){localStorage.setItem(STORE,JSON.stringify({notes,activeCategory,selectedId}))}function load(){try{const s=JSON.parse(localStorage.getItem(STORE)||"null");if(s){notes=(s.notes||[]).map(normalize);activeCategory=s.activeCategory||"全部";selectedId=s.selectedId||null}}catch{}}
function categories(){return["全部",...Array.from(new Set(notes.map(n=>n.category))).sort((a,b)=>a.localeCompare(b,"zh-CN"))]}
function filtered(){const q=els.search.value.trim().toLowerCase(),fc=els.cat.value||"全部",st=els.status.value;return notes.filter(n=>(activeCategory==="全部"||n.category===activeCategory)&&(fc==="全部"||n.category===fc)&&(st==="all"||n.source===st)&&(!q||[n.title,n.content,n.comment,n.summary,n.author,n.link,n.category,n.matchedKeywords.join(" ")].join(" ").toLowerCase().includes(q)))}
function sourceClass(s){return s==="收藏"?"favorite":s==="点赞"?"like":"note"}
function renderTabs(){const counts=notes.reduce((a,n)=>(a[n.category]=(a[n.category]||0)+1,a),{});els.tabs.innerHTML=categories().map(c=>`<button class="tab ${activeCategory===c?"active":""}" data-c="${esc(c)}"><span>${esc(c)}</span><span>${c==="全部"?notes.length:counts[c]||0}</span></button>`).join("");els.tabs.querySelectorAll("button").forEach(b=>b.onclick=()=>{activeCategory=b.dataset.c;els.cat.value=activeCategory;save();render()})}
function renderFilters(){const cur=els.cat.value||activeCategory;els.cat.innerHTML=categories().map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");els.cat.value=categories().includes(cur)?cur:"全部"}
function renderList(){const fs=filtered();els.visible.textContent=fs.length;if(!fs.length){els.list.innerHTML='<div class="empty">没有匹配结果</div>';renderDetail(null);return}if(!fs.some(n=>n.id===selectedId))selectedId=fs[0].id;els.list.innerHTML=fs.map(n=>`<button class="card ${selectedId===n.id?"active":""}" data-id="${esc(n.id)}"><div><div class="meta"><span class="pill ${sourceClass(n.source)}">${esc(n.source)}</span><span class="pill">${esc(n.category)}</span><span class="confidence">${n.confidence}% 匹配</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p></div><span class="confidence">${n.link?"可跳转":"无链接"}</span></button>`).join("");els.list.querySelectorAll(".card").forEach(b=>b.onclick=()=>{selectedId=b.dataset.id;activeView="detailView";save();render();setView("detailView")});renderDetail(notes.find(n=>n.id===selectedId))}
function renderDetail(n){if(!n){els.detail.innerHTML='<div class="empty">选择一篇内容查看核心信息</div>';return}els.detail.innerHTML=`<h2>${esc(n.title)}</h2><div class="meta" style="margin-top:10px"><span class="pill ${sourceClass(n.source)}">${esc(n.source)}</span><span class="pill">${esc(n.category)}</span><span class="pill">${esc(n.author)}</span></div><div class="block"><h3>核心摘要</h3><p>${esc(n.summary)}</p></div><div class="block"><h3>要点</h3><ul>${(n.keyPoints.length?n.keyPoints:[n.content||n.title]).map(p=>`<li>${esc(p)}</li>`).join("")}</ul></div><div class="block"><h3>关键词</h3><div class="chips">${(n.tags.length?n.tags:n.matchedKeywords.length?n.matchedKeywords:["暂无"]).map(x=>`<span class="pill">${esc(x)}</span>`).join("")}</div></div><div class="block"><h3>原文链接</h3><p>${n.link?esc(n.link):"未导入链接"}</p></div><div class="detail-actions">${n.link?`<a class="open" href="${esc(n.link)}" target="_blank" rel="noreferrer">打开原帖</a>`:""}<button id="editCurrent">编辑这条</button><button class="danger" id="deleteCurrent">删除这条</button></div>`;$("#editCurrent").onclick=()=>editNote(n.id);$("#deleteCurrent").onclick=()=>deleteNote(n.id)}
function renderRules(){els.rulesList.innerHTML=`<div class="rule"><b>现在的导入方式</b><p>粘贴链接后，自己补充标题、关键词、备注或评论。程序会根据你填的关键词和备注自动分类、摘要。</p></div><div class="rule"><b>编辑和改分区</b><p>在详情页点“编辑这条”，可以重新修改标题、关键词、备注，也可以在“分区”里手动指定分类，比如“影视·影评解析”。</p></div><div class="rule"><b>重复和错误链接</b><p>新增时如果链接重复会提醒；进入详情页可以点“删除这条”清理不需要的条目。</p></div>`}
function renderMetrics(){els.total.textContent=notes.length;els.catCount.textContent=new Set(notes.map(n=>n.category)).size;els.linkCount.textContent=notes.filter(n=>n.link).length}
function setView(v){activeView=v;els.views.forEach(x=>x.classList.toggle("active",x.id===v));els.nav.forEach(b=>b.classList.toggle("active",b.dataset.view===v))}

async function loadFile(f){const txt=await f.text();notes=parseInput(txt).map(normalize);selectedId=notes[0]?.id||null;activeCategory="全部";activeView="notesView";save();render()}
function download(){const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),notes},null,2)],{type:"application/json;charset=utf-8"}),u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download="xhs-content-organized.json";a.click();URL.revokeObjectURL(u)}

els.file.onchange=e=>{const f=e.target.files[0];if(f)loadFile(f)};els.pasteToggle.onclick=()=>els.pastePanel.classList.toggle("active");els.readClipboard.onclick=async()=>{try{els.pasteInput.value=await navigator.clipboard.readText();fillManualFromPaste()}catch{alert("浏览器不允许读取剪贴板，请手动粘贴。")}};els.parsePasted.onclick=fillManualFromPaste;els.pasteInput.oninput=fillManualFromPaste;els.clearManual.onclick=clearManualForm;els.addPasted.onclick=addManual;els.loadSample.onclick=()=>{notes=samples.map(normalize);selectedId=notes[0].id;activeCategory="全部";activeView="notesView";save();render()};els.recluster.onclick=recluster;els.search.oninput=renderList;els.cat.onchange=()=>{activeCategory=els.cat.value;save();render()};els.status.onchange=renderList;els.exportJson.onclick=download;els.nav.forEach(b=>b.onclick=()=>setView(b.dataset.view));load();render();shareParams();if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
